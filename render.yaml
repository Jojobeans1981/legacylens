services:
  - type: web
    name: legacylens
    env: python
    buildCommand: "pip install --no-cache-dir -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PINECONE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: legacylens-blas
      - key: DB_PATH
        value: /data/legacylens.db
      - key: BLAS_SOURCE_DIR
        value: /data/blas_source
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5-20251001
    disk:
      name: legacylens-data
      mountPath: /data
      sizeGB: 1
