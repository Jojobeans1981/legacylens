<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRIMOIRE — Routine Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117; --surface: #161b22; --border: #30363d;
            --text: #e6edf3; --text-dim: #8b949e; --accent: #58a6ff;
            --accent-dim: #1f6feb; --green: #3fb950; --orange: #d29922;
            --red: #f85149; --purple: #bc8cff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.6;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
        }
        header h1 { font-size: 24px; font-weight: 600; }
        header h1 span { color: var(--accent); }
        .header-links a {
            color: var(--text-dim); text-decoration: none; margin-left: 16px;
            font-size: 14px;
        }
        .header-links a:hover { color: var(--accent); }

        .stats-row {
            display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .stat-chip {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 6px 16px; font-size: 13px;
            display: flex; align-items: center; gap: 6px;
        }
        .stat-chip .count { font-weight: 700; }
        .stat-chip.blas .count { color: var(--accent); }
        .stat-chip.lapack .count { color: var(--green); }
        .stat-chip.scalapack .count { color: var(--purple); }
        .stat-chip.total .count { color: var(--text); }
        .stat-chip.dead .count { color: var(--red); }

        .controls {
            display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
            align-items: center;
        }
        .search-box {
            flex: 1; min-width: 200px; background: var(--surface);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 8px 14px; color: var(--text); font-size: 14px;
            outline: none;
        }
        .search-box:focus { border-color: var(--accent); }
        .search-box::placeholder { color: var(--text-dim); }
        .tab-group {
            display: flex; gap: 4px; background: var(--surface);
            border-radius: 8px; padding: 4px; border: 1px solid var(--border);
        }
        .tab {
            padding: 6px 14px; border: none; background: transparent;
            color: var(--text-dim); cursor: pointer; border-radius: 6px;
            font-size: 13px; font-weight: 500; transition: all 0.2s;
        }
        .tab:hover { color: var(--text); }
        .tab.active { background: var(--accent-dim); color: #fff; }
        .tab.dead-tab.active { background: rgba(248,81,73,0.3); color: var(--red); }

        .compare-bar {
            display: none; align-items: center; gap: 12px;
            margin-bottom: 16px; padding: 12px 16px;
            background: rgba(88,166,255,0.08); border: 1px solid var(--accent-dim);
            border-radius: 8px; font-size: 13px;
        }
        .compare-bar.visible { display: flex; }
        .compare-bar .selected-names { flex: 1; color: var(--accent); font-weight: 600; }
        .compare-btn {
            padding: 6px 16px; border: none; background: var(--accent-dim);
            color: #fff; border-radius: 6px; cursor: pointer; font-size: 13px;
            font-weight: 600;
        }
        .compare-btn:hover { background: var(--accent); }
        .compare-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .clear-compare {
            padding: 6px 12px; border: 1px solid var(--border); background: transparent;
            color: var(--text-dim); border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        .clear-compare:hover { color: var(--text); border-color: var(--text-dim); }

        .section {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            text-align: left; padding: 8px 12px; color: var(--text-dim);
            border-bottom: 1px solid var(--border); font-weight: 500;
            text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;
            cursor: pointer; user-select: none;
        }
        th:hover { color: var(--accent); }
        th.active-sort { color: var(--accent); }
        td {
            padding: 8px 12px; border-bottom: 1px solid rgba(48,54,61,0.5);
        }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .routine-link {
            color: var(--accent); text-decoration: none; font-family: monospace;
            font-weight: 600;
        }
        .routine-link:hover { text-decoration: underline; }
        .lib-badge {
            font-size: 10px; padding: 2px 6px; border-radius: 10px;
            font-weight: 700; text-transform: uppercase;
        }
        .lib-blas { background: rgba(88,166,255,0.15); color: var(--accent); }
        .lib-lapack { background: rgba(63,185,80,0.15); color: var(--green); }
        .lib-scalapack { background: rgba(188,140,255,0.15); color: var(--purple); }
        .type-badge {
            font-size: 11px; padding: 2px 8px; border-radius: 10px;
            background: rgba(255,255,255,0.05); color: var(--text-dim);
        }
        .dead-badge {
            font-size: 9px; padding: 1px 5px; border-radius: 8px;
            background: rgba(248,81,73,0.15); color: var(--red);
            font-weight: 700; margin-left: 6px;
        }
        .file-path { font-family: monospace; font-size: 12px; color: var(--text-dim); }
        .metric { font-family: monospace; font-size: 12px; text-align: center; }
        .depth-low { color: var(--green); }
        .depth-med { color: var(--orange); }
        .depth-high { color: var(--red); }
        .pagination {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 16px; font-size: 13px; color: var(--text-dim);
        }
        .page-btn {
            padding: 6px 12px; border: 1px solid var(--border); background: var(--surface);
            color: var(--text-dim); border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        .page-btn:hover { color: var(--text); border-color: var(--accent); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        input[type="checkbox"] {
            appearance: none; width: 16px; height: 16px; border: 1px solid var(--border);
            border-radius: 4px; background: var(--surface); cursor: pointer;
            vertical-align: middle;
        }
        input[type="checkbox"]:checked {
            background: var(--accent-dim); border-color: var(--accent);
        }
        input[type="checkbox"]:checked::after {
            content: '\2713'; display: block; text-align: center;
            font-size: 11px; color: #fff; line-height: 16px;
        }

        /* Compare panel */
        .compare-panel {
            display: none; margin-bottom: 20px;
        }
        .compare-panel.visible { display: block; }
        .compare-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
        }
        .compare-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px;
        }
        .compare-card h3 {
            font-family: monospace; font-size: 18px; margin-bottom: 12px;
            color: var(--accent);
        }
        .compare-card .meta-row {
            display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
        }
        .compare-metrics {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            margin-bottom: 16px;
        }
        .compare-metric {
            background: rgba(255,255,255,0.03); padding: 8px 12px;
            border-radius: 8px; text-align: center;
        }
        .compare-metric .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
        .compare-metric .value { font-size: 20px; font-weight: 700; font-family: monospace; }
        .call-list { font-size: 12px; }
        .call-list h4 { color: var(--text-dim); font-size: 11px; text-transform: uppercase; margin-bottom: 4px; }
        .call-list .call-item {
            display: inline-block; padding: 2px 8px; margin: 2px;
            background: rgba(255,255,255,0.05); border-radius: 4px;
            font-family: monospace; font-size: 11px;
        }
        .close-compare {
            display: inline-block; margin-bottom: 12px; padding: 6px 14px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text-dim); border-radius: 6px; cursor: pointer;
            font-size: 13px;
        }
        .close-compare:hover { color: var(--text); border-color: var(--text-dim); }
        .diff-highlight { color: var(--orange); font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>GRIM<span>OIRE</span> Explorer</h1>
            <div class="header-links">
                <a href="/">Query</a>
                <a href="/callgraph">Call Graph</a>
                <a href="/dashboard">Dashboard</a>
                <a href="/docs">API Docs</a>
            </div>
        </header>

        <div class="stats-row" id="statsRow">
            <div class="stat-chip total">Total: <span class="count" id="countAll">...</span></div>
            <div class="stat-chip blas">BLAS: <span class="count" id="countBlas">...</span></div>
            <div class="stat-chip lapack">LAPACK: <span class="count" id="countLapack">...</span></div>
            <div class="stat-chip scalapack">ScaLAPACK: <span class="count" id="countScalapack">...</span></div>
            <div class="stat-chip dead">Unused: <span class="count" id="countDead">...</span></div>
        </div>

        <div class="controls">
            <input type="text" class="search-box" id="searchInput" placeholder="Search routines (e.g. DGEMM, SGEMV)...">
            <div class="tab-group" id="tabGroup">
                <button class="tab active" data-lib="">All</button>
                <button class="tab" data-lib="BLAS">BLAS</button>
                <button class="tab" data-lib="LAPACK">LAPACK</button>
                <button class="tab" data-lib="ScaLAPACK">ScaLAPACK</button>
                <button class="tab dead-tab" data-lib="DEAD">Unused</button>
            </div>
        </div>

        <div class="compare-bar" id="compareBar">
            <span>Compare:</span>
            <span class="selected-names" id="compareNames">Select 2 routines</span>
            <button class="compare-btn" id="compareBtn" disabled>Compare</button>
            <button class="clear-compare" id="clearCompare">Clear</button>
        </div>

        <div class="compare-panel" id="comparePanel">
            <button class="close-compare" id="closeCompare">Close comparison</button>
            <div class="compare-grid" id="compareGrid"></div>
        </div>

        <div class="section" id="tableSection">
            <table>
                <thead>
                    <tr>
                        <th style="width:30px;cursor:default;"></th>
                        <th data-sort="routine_name">Routine</th>
                        <th data-sort="chunk_type">Type</th>
                        <th data-sort="file_path">File</th>
                        <th data-sort="loc">LOC</th>
                        <th data-sort="var_count">Vars</th>
                        <th data-sort="call_count">Calls</th>
                        <th data-sort="nesting_depth">Depth</th>
                        <th data-sort="library">Library</th>
                    </tr>
                </thead>
                <tbody id="routineTable"></tbody>
            </table>
            <div class="pagination">
                <span id="pageInfo">Loading...</span>
                <div style="display:flex;gap:8px;">
                    <button class="page-btn" id="prevBtn" disabled>&lt; Prev</button>
                    <button class="page-btn" id="nextBtn">Next &gt;</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allRoutines = [];
        let filtered = [];
        let deadCodeSet = new Set();
        let currentLib = '';
        let sortField = 'routine_name';
        let sortAsc = true;
        let page = 0;
        const PAGE_SIZE = 50;
        let selectedForCompare = new Set();

        // Event delegation for tabs
        document.getElementById('tabGroup').addEventListener('click', function(e) {
            const tab = e.target.closest('.tab');
            if (!tab) return;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentLib = tab.dataset.lib;
            page = 0;
            filterRoutines();
        });

        // Event delegation for sortable headers
        document.querySelector('thead').addEventListener('click', function(e) {
            const th = e.target.closest('th[data-sort]');
            if (!th) return;
            sortBy(th.dataset.sort);
        });

        // Search input
        document.getElementById('searchInput').addEventListener('input', function() {
            page = 0;
            filterRoutines();
        });

        // Pagination
        document.getElementById('prevBtn').addEventListener('click', function() { page--; renderPage(); });
        document.getElementById('nextBtn').addEventListener('click', function() { page++; renderPage(); });

        // Compare buttons
        document.getElementById('compareBtn').addEventListener('click', doCompare);
        document.getElementById('clearCompare').addEventListener('click', clearCompare);
        document.getElementById('closeCompare').addEventListener('click', closeCompare);

        // Event delegation for checkboxes
        document.getElementById('routineTable').addEventListener('change', function(e) {
            if (e.target.type === 'checkbox') {
                const name = e.target.dataset.routine;
                if (e.target.checked) {
                    if (selectedForCompare.size >= 2) {
                        e.target.checked = false;
                        return;
                    }
                    selectedForCompare.add(name);
                } else {
                    selectedForCompare.delete(name);
                }
                updateCompareBar();
            }
        });

        async function loadRoutines() {
            try {
                const [routinesResp, deadResp] = await Promise.all([
                    fetch('/api/routines'),
                    fetch('/api/dead-code')
                ]);
                if (routinesResp.ok) {
                    allRoutines = await routinesResp.json();
                }
                if (deadResp.ok) {
                    const deadList = await deadResp.json();
                    deadCodeSet = new Set(deadList.map(d => d.routine_name.toUpperCase()));
                    document.getElementById('countDead').textContent = deadCodeSet.size;
                }
                updateCounts();
                filterRoutines();

                // Check URL for compare params
                const params = new URLSearchParams(window.location.search);
                const compareParam = params.get('compare');
                if (compareParam) {
                    const names = compareParam.split(',');
                    if (names.length === 2) {
                        selectedForCompare = new Set(names);
                        updateCompareBar();
                        doCompare();
                    }
                }
            } catch (e) {
                document.getElementById('routineTable').innerHTML =
                    '<tr><td colspan="9" style="color:var(--red)">Failed to load routines. Run ingestion first.</td></tr>';
            }
        }

        function updateCounts() {
            const blas = allRoutines.filter(r => r.library === 'BLAS').length;
            const lapack = allRoutines.filter(r => r.library === 'LAPACK').length;
            const scala = allRoutines.filter(r => r.library === 'ScaLAPACK').length;
            document.getElementById('countAll').textContent = allRoutines.length;
            document.getElementById('countBlas').textContent = blas;
            document.getElementById('countLapack').textContent = lapack;
            document.getElementById('countScalapack').textContent = scala;
        }

        function filterRoutines() {
            const search = document.getElementById('searchInput').value.toUpperCase();
            filtered = allRoutines.filter(r => {
                if (currentLib === 'DEAD') {
                    if (!deadCodeSet.has((r.routine_name || '').toUpperCase())) return false;
                } else if (currentLib && r.library !== currentLib) {
                    return false;
                }
                if (search && !(r.routine_name || '').toUpperCase().includes(search)) return false;
                return true;
            });
            doSort();
            renderPage();
        }

        function sortBy(field) {
            if (sortField === field) { sortAsc = !sortAsc; }
            else { sortField = field; sortAsc = true; }
            // Update header styling
            document.querySelectorAll('th[data-sort]').forEach(th => {
                th.classList.toggle('active-sort', th.dataset.sort === field);
            });
            doSort();
            renderPage();
        }

        function doSort() {
            filtered.sort((a, b) => {
                let va = a[sortField] || '';
                let vb = b[sortField] || '';
                if (typeof va === 'string') va = va.toUpperCase();
                if (typeof vb === 'string') vb = vb.toUpperCase();
                if (typeof va === 'number' && typeof vb === 'number') {
                    return sortAsc ? va - vb : vb - va;
                }
                if (va < vb) return sortAsc ? -1 : 1;
                if (va > vb) return sortAsc ? 1 : -1;
                return 0;
            });
        }

        function depthClass(d) {
            if (d <= 2) return 'depth-low';
            if (d <= 4) return 'depth-med';
            return 'depth-high';
        }

        function renderPage() {
            const start = page * PAGE_SIZE;
            const end = Math.min(start + PAGE_SIZE, filtered.length);
            const tbody = document.getElementById('routineTable');

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="color:var(--text-dim)">No routines found.</td></tr>';
                document.getElementById('pageInfo').textContent = '0 results';
                document.getElementById('prevBtn').disabled = true;
                document.getElementById('nextBtn').disabled = true;
                return;
            }

            tbody.innerHTML = filtered.slice(start, end).map(r => {
                const libClass = r.library === 'ScaLAPACK' ? 'lib-scalapack' :
                                 r.library === 'LAPACK' ? 'lib-lapack' : 'lib-blas';
                const isDead = deadCodeSet.has((r.routine_name || '').toUpperCase());
                const deadTag = isDead ? '<span class="dead-badge">UNUSED</span>' : '';
                const checked = selectedForCompare.has(r.routine_name) ? 'checked' : '';
                const depth = r.nesting_depth || 0;
                return `<tr>
                    <td><input type="checkbox" data-routine="${r.routine_name}" ${checked}></td>
                    <td><a class="routine-link" href="/?query=Explain ${encodeURIComponent(r.routine_name)}&mode=explain">${r.routine_name}</a>${deadTag}</td>
                    <td><span class="type-badge">${r.chunk_type}</span></td>
                    <td class="file-path">${r.file_path}</td>
                    <td class="metric">${r.loc || 0}</td>
                    <td class="metric">${r.var_count || 0}</td>
                    <td class="metric">${r.call_count || 0}</td>
                    <td class="metric ${depthClass(depth)}">${depth}</td>
                    <td><span class="lib-badge ${libClass}">${r.library}</span></td>
                </tr>`;
            }).join('');

            document.getElementById('pageInfo').textContent =
                `${start + 1}-${end} of ${filtered.length} routines`;
            document.getElementById('prevBtn').disabled = page === 0;
            document.getElementById('nextBtn').disabled = end >= filtered.length;
        }

        function updateCompareBar() {
            const bar = document.getElementById('compareBar');
            const names = document.getElementById('compareNames');
            const btn = document.getElementById('compareBtn');
            if (selectedForCompare.size > 0) {
                bar.classList.add('visible');
                names.textContent = Array.from(selectedForCompare).join(' vs ');
                btn.disabled = selectedForCompare.size !== 2;
            } else {
                bar.classList.remove('visible');
            }
        }

        function clearCompare() {
            selectedForCompare.clear();
            updateCompareBar();
            renderPage();
        }

        async function doCompare() {
            const names = Array.from(selectedForCompare);
            if (names.length !== 2) return;

            // Update URL
            history.replaceState(null, '', `/explorer?compare=${names.join(',')}`);

            try {
                const resp = await fetch(`/api/compare?routine1=${encodeURIComponent(names[0])}&routine2=${encodeURIComponent(names[1])}`);
                if (!resp.ok) {
                    const err = await resp.json();
                    alert(err.detail || 'Compare failed');
                    return;
                }
                const data = await resp.json();
                renderComparePanel(data.routine1, data.routine2);
            } catch (e) {
                alert('Failed to compare routines');
            }
        }

        function renderComparePanel(r1, r2) {
            const panel = document.getElementById('comparePanel');
            const grid = document.getElementById('compareGrid');
            panel.classList.add('visible');
            document.getElementById('tableSection').style.display = 'none';

            grid.innerHTML = [r1, r2].map(r => {
                const libClass = r.library === 'ScaLAPACK' ? 'lib-scalapack' :
                                 r.library === 'LAPACK' ? 'lib-lapack' : 'lib-blas';
                const isDead = deadCodeSet.has((r.routine_name || '').toUpperCase());

                const callerItems = (r.callers || []).map(c =>
                    `<span class="call-item">${c.name}</span>`
                ).join('') || '<span style="color:var(--text-dim)">None</span>';

                const calleeItems = (r.callees || []).map(c =>
                    `<span class="call-item">${c.name}</span>`
                ).join('') || '<span style="color:var(--text-dim)">None</span>';

                return `<div class="compare-card">
                    <h3>${r.routine_name}${isDead ? ' <span class="dead-badge">UNUSED</span>' : ''}</h3>
                    <div class="meta-row">
                        <span class="lib-badge ${libClass}">${r.library}</span>
                        <span class="type-badge">${r.chunk_type}</span>
                        <span class="file-path">${r.file_path}:${r.start_line}-${r.end_line}</span>
                    </div>
                    <div class="compare-metrics">
                        <div class="compare-metric"><div class="label">Lines of Code</div><div class="value">${r.loc || 0}</div></div>
                        <div class="compare-metric"><div class="label">Variables</div><div class="value">${r.var_count || 0}</div></div>
                        <div class="compare-metric"><div class="label">Calls Made</div><div class="value">${r.call_count || 0}</div></div>
                        <div class="compare-metric"><div class="label">Nesting Depth</div><div class="value ${depthClass(r.nesting_depth || 0)}">${r.nesting_depth || 0}</div></div>
                    </div>
                    <div class="call-list">
                        <h4>Called by (${(r.callers || []).length})</h4>
                        <div>${callerItems}</div>
                    </div>
                    <div class="call-list" style="margin-top:12px">
                        <h4>Calls (${(r.callees || []).length})</h4>
                        <div>${calleeItems}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function closeCompare() {
            document.getElementById('comparePanel').classList.remove('visible');
            document.getElementById('tableSection').style.display = '';
            history.replaceState(null, '', '/explorer');
        }

        loadRoutines();
    </script>
</body>
</html>
