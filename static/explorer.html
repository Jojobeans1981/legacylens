<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegacyLens — Routine Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117; --surface: #161b22; --border: #30363d;
            --text: #e6edf3; --text-dim: #8b949e; --accent: #58a6ff;
            --accent-dim: #1f6feb; --green: #3fb950; --orange: #d29922;
            --red: #f85149; --purple: #bc8cff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.6;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
        }
        header h1 { font-size: 24px; font-weight: 600; }
        header h1 span { color: var(--accent); }
        .header-links a {
            color: var(--text-dim); text-decoration: none; margin-left: 16px;
            font-size: 14px;
        }
        .header-links a:hover { color: var(--accent); }

        .stats-row {
            display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .stat-chip {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 6px 16px; font-size: 13px;
            display: flex; align-items: center; gap: 6px;
        }
        .stat-chip .count { font-weight: 700; }
        .stat-chip.blas .count { color: var(--accent); }
        .stat-chip.lapack .count { color: var(--green); }
        .stat-chip.scalapack .count { color: var(--purple); }
        .stat-chip.total .count { color: var(--text); }

        .controls {
            display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
            align-items: center;
        }
        .search-box {
            flex: 1; min-width: 200px; background: var(--surface);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 8px 14px; color: var(--text); font-size: 14px;
            outline: none;
        }
        .search-box:focus { border-color: var(--accent); }
        .search-box::placeholder { color: var(--text-dim); }
        .tab-group {
            display: flex; gap: 4px; background: var(--surface);
            border-radius: 8px; padding: 4px; border: 1px solid var(--border);
        }
        .tab {
            padding: 6px 14px; border: none; background: transparent;
            color: var(--text-dim); cursor: pointer; border-radius: 6px;
            font-size: 13px; font-weight: 500; transition: all 0.2s;
        }
        .tab:hover { color: var(--text); }
        .tab.active { background: var(--accent-dim); color: #fff; }

        .section {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            text-align: left; padding: 8px 12px; color: var(--text-dim);
            border-bottom: 1px solid var(--border); font-weight: 500;
            text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;
            cursor: pointer; user-select: none;
        }
        th:hover { color: var(--accent); }
        td {
            padding: 8px 12px; border-bottom: 1px solid rgba(48,54,61,0.5);
        }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .routine-link {
            color: var(--accent); text-decoration: none; font-family: monospace;
            font-weight: 600;
        }
        .routine-link:hover { text-decoration: underline; }
        .lib-badge {
            font-size: 10px; padding: 2px 6px; border-radius: 10px;
            font-weight: 700; text-transform: uppercase;
        }
        .lib-blas { background: rgba(88,166,255,0.15); color: var(--accent); }
        .lib-lapack { background: rgba(63,185,80,0.15); color: var(--green); }
        .lib-scalapack { background: rgba(188,140,255,0.15); color: var(--purple); }
        .type-badge {
            font-size: 11px; padding: 2px 8px; border-radius: 10px;
            background: rgba(255,255,255,0.05); color: var(--text-dim);
        }
        .file-path { font-family: monospace; font-size: 12px; color: var(--text-dim); }
        .pagination {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 16px; font-size: 13px; color: var(--text-dim);
        }
        .page-btn {
            padding: 6px 12px; border: 1px solid var(--border); background: var(--surface);
            color: var(--text-dim); border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        .page-btn:hover { color: var(--text); border-color: var(--accent); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Legacy<span>Lens</span> Explorer</h1>
            <div class="header-links">
                <a href="/">Query</a>
                <a href="/callgraph">Call Graph</a>
                <a href="/dashboard">Dashboard</a>
                <a href="/docs">API Docs</a>
            </div>
        </header>

        <div class="stats-row" id="statsRow">
            <div class="stat-chip total">Total: <span class="count" id="countAll">...</span></div>
            <div class="stat-chip blas">BLAS: <span class="count" id="countBlas">...</span></div>
            <div class="stat-chip lapack">LAPACK: <span class="count" id="countLapack">...</span></div>
            <div class="stat-chip scalapack">ScaLAPACK: <span class="count" id="countScalapack">...</span></div>
        </div>

        <div class="controls">
            <input type="text" class="search-box" id="searchInput" placeholder="Search routines (e.g. DGEMM, SGEMV)..." oninput="filterRoutines()">
            <div class="tab-group">
                <button class="tab active" data-lib="" onclick="setLibFilter(this)">All</button>
                <button class="tab" data-lib="BLAS" onclick="setLibFilter(this)">BLAS</button>
                <button class="tab" data-lib="LAPACK" onclick="setLibFilter(this)">LAPACK</button>
                <button class="tab" data-lib="ScaLAPACK" onclick="setLibFilter(this)">ScaLAPACK</button>
            </div>
        </div>

        <div class="section">
            <table>
                <thead>
                    <tr>
                        <th onclick="sortBy('routine_name')">Routine</th>
                        <th onclick="sortBy('chunk_type')">Type</th>
                        <th onclick="sortBy('file_path')">File</th>
                        <th onclick="sortBy('start_line')">Lines</th>
                        <th onclick="sortBy('library')">Library</th>
                    </tr>
                </thead>
                <tbody id="routineTable"></tbody>
            </table>
            <div class="pagination">
                <span id="pageInfo">Loading...</span>
                <div style="display:flex;gap:8px;">
                    <button class="page-btn" id="prevBtn" onclick="prevPage()" disabled>&lt; Prev</button>
                    <button class="page-btn" id="nextBtn" onclick="nextPage()">Next &gt;</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allRoutines = [];
        let filtered = [];
        let currentLib = '';
        let sortField = 'routine_name';
        let sortAsc = true;
        let page = 0;
        const PAGE_SIZE = 50;

        async function loadRoutines() {
            try {
                const resp = await fetch('/api/routines');
                if (!resp.ok) return;
                allRoutines = await resp.json();
                updateCounts();
                filterRoutines();
            } catch (e) {
                document.getElementById('routineTable').innerHTML =
                    '<tr><td colspan="5" style="color:var(--red)">Failed to load routines. Run ingestion first.</td></tr>';
            }
        }

        function updateCounts() {
            const blas = allRoutines.filter(r => r.library === 'BLAS').length;
            const lapack = allRoutines.filter(r => r.library === 'LAPACK').length;
            const scala = allRoutines.filter(r => r.library === 'ScaLAPACK').length;
            document.getElementById('countAll').textContent = allRoutines.length;
            document.getElementById('countBlas').textContent = blas;
            document.getElementById('countLapack').textContent = lapack;
            document.getElementById('countScalapack').textContent = scala;
        }

        function setLibFilter(btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            currentLib = btn.dataset.lib;
            page = 0;
            filterRoutines();
        }

        function filterRoutines() {
            const search = document.getElementById('searchInput').value.toUpperCase();
            filtered = allRoutines.filter(r => {
                if (currentLib && r.library !== currentLib) return false;
                if (search && !r.routine_name.toUpperCase().includes(search)) return false;
                return true;
            });
            doSort();
            renderPage();
        }

        function sortBy(field) {
            if (sortField === field) { sortAsc = !sortAsc; }
            else { sortField = field; sortAsc = true; }
            doSort();
            renderPage();
        }

        function doSort() {
            filtered.sort((a, b) => {
                let va = a[sortField] || '';
                let vb = b[sortField] || '';
                if (typeof va === 'string') va = va.toUpperCase();
                if (typeof vb === 'string') vb = vb.toUpperCase();
                if (va < vb) return sortAsc ? -1 : 1;
                if (va > vb) return sortAsc ? 1 : -1;
                return 0;
            });
        }

        function renderPage() {
            const start = page * PAGE_SIZE;
            const end = Math.min(start + PAGE_SIZE, filtered.length);
            const tbody = document.getElementById('routineTable');

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="color:var(--text-dim)">No routines found.</td></tr>';
                document.getElementById('pageInfo').textContent = '0 results';
                document.getElementById('prevBtn').disabled = true;
                document.getElementById('nextBtn').disabled = true;
                return;
            }

            tbody.innerHTML = filtered.slice(start, end).map(r => {
                const libClass = r.library === 'ScaLAPACK' ? 'lib-scalapack' :
                                 r.library === 'LAPACK' ? 'lib-lapack' : 'lib-blas';
                const lines = r.end_line - r.start_line + 1;
                return `<tr>
                    <td><a class="routine-link" href="/?query=Explain ${encodeURIComponent(r.routine_name)}&mode=explain">${r.routine_name}</a></td>
                    <td><span class="type-badge">${r.chunk_type}</span></td>
                    <td class="file-path">${r.file_path}</td>
                    <td>${r.start_line}-${r.end_line} (${lines})</td>
                    <td><span class="lib-badge ${libClass}">${r.library}</span></td>
                </tr>`;
            }).join('');

            document.getElementById('pageInfo').textContent =
                `${start + 1}-${end} of ${filtered.length} routines`;
            document.getElementById('prevBtn').disabled = page === 0;
            document.getElementById('nextBtn').disabled = end >= filtered.length;
        }

        function prevPage() { page--; renderPage(); }
        function nextPage() { page++; renderPage(); }

        loadRoutines();
    </script>
</body>
</html>
