<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegacyLens — BLAS Code Explorer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/fortran.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117; --surface: #161b22; --border: #30363d;
            --text: #e6edf3; --text-dim: #8b949e; --accent: #58a6ff;
            --accent-dim: #1f6feb; --green: #3fb950; --orange: #d29922;
            --red: #f85149; --purple: #bc8cff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
        }
        header h1 { font-size: 24px; font-weight: 600; }
        header h1 span { color: var(--accent); }
        .header-links a {
            color: var(--text-dim); text-decoration: none; margin-left: 16px;
            font-size: 14px; transition: color 0.2s;
        }
        .header-links a:hover { color: var(--accent); }

        /* Mode selector */
        .mode-selector {
            display: flex; gap: 4px; margin-bottom: 16px;
            background: var(--surface); border-radius: 8px; padding: 4px;
            border: 1px solid var(--border);
        }
        .mode-btn {
            padding: 8px 16px; border: none; background: transparent;
            color: var(--text-dim); cursor: pointer; border-radius: 6px;
            font-size: 14px; font-weight: 500; transition: all 0.2s;
        }
        .mode-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        .mode-btn.active { background: var(--accent-dim); color: #fff; }

        /* Query input */
        .query-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px; margin-bottom: 16px;
        }
        .query-box textarea {
            width: 100%; background: transparent; border: none; color: var(--text);
            font-size: 16px; resize: none; outline: none; font-family: inherit;
            min-height: 60px;
        }
        .query-box textarea::placeholder { color: var(--text-dim); }
        .query-controls {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
        }
        .optional-inputs { display: flex; gap: 8px; }
        .optional-inputs input {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            padding: 6px 12px; border-radius: 6px; font-size: 13px; width: 160px;
        }
        .optional-inputs input::placeholder { color: var(--text-dim); }
        .submit-btn {
            background: var(--accent-dim); color: #fff; border: none;
            padding: 8px 20px; border-radius: 8px; cursor: pointer;
            font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px;
            transition: background 0.2s;
        }
        .submit-btn:hover { background: var(--accent); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .shortcut-hint { color: var(--text-dim); font-size: 12px; }

        /* Results area */
        .results-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        @media (max-width: 900px) { .results-grid { grid-template-columns: 1fr; } }

        .answer-panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; min-height: 200px;
        }
        .answer-panel h3 {
            font-size: 14px; color: var(--text-dim); text-transform: uppercase;
            letter-spacing: 0.5px; margin-bottom: 12px;
        }
        .answer-content {
            font-size: 15px; line-height: 1.7; white-space: pre-wrap;
            word-wrap: break-word;
        }
        .answer-content code {
            background: var(--bg); padding: 2px 6px; border-radius: 4px;
            font-size: 13px;
        }
        .answer-meta {
            margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border);
            display: flex; gap: 16px; font-size: 12px; color: var(--text-dim);
        }
        .copy-btn {
            background: var(--bg); border: 1px solid var(--border); color: var(--text-dim);
            padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
            transition: all 0.2s;
        }
        .copy-btn:hover { color: var(--text); border-color: var(--accent); }

        /* Chunks panel */
        .chunks-panel { display: flex; flex-direction: column; gap: 12px; }
        .chunks-panel h3 {
            font-size: 14px; color: var(--text-dim); text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .chunk-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; overflow: hidden;
        }
        .chunk-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px; background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border); cursor: pointer;
        }
        .chunk-header:hover { background: rgba(255,255,255,0.05); }
        .chunk-file { font-size: 13px; color: var(--accent); font-family: monospace; }
        .chunk-score {
            font-size: 11px; padding: 2px 8px; border-radius: 10px;
            font-weight: 600;
        }
        .score-high { background: rgba(63,185,80,0.15); color: var(--green); }
        .score-mid { background: rgba(210,153,34,0.15); color: var(--orange); }
        .score-low { background: rgba(248,81,73,0.15); color: var(--red); }
        .chunk-code {
            max-height: 200px; overflow-y: auto; font-size: 12px;
        }
        .chunk-code pre { margin: 0; padding: 8px 12px; }

        /* Loading spinner */
        .loading { display: none; align-items: center; gap: 8px; color: var(--text-dim); }
        .loading.active { display: flex; }
        .spinner {
            width: 16px; height: 16px; border: 2px solid var(--border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* History */
        .history {
            margin-top: 24px; padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .history h3 {
            font-size: 14px; color: var(--text-dim); margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .history-item {
            padding: 6px 12px; cursor: pointer; border-radius: 6px;
            font-size: 13px; color: var(--text-dim); transition: all 0.2s;
        }
        .history-item:hover { background: var(--surface); color: var(--text); }

        /* Empty state */
        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--text-dim);
        }
        .empty-state h2 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
        .empty-state p { font-size: 14px; max-width: 500px; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Legacy<span>Lens</span></h1>
            <div class="header-links">
                <a href="/dashboard">Dashboard</a>
                <a href="/health">Health</a>
            </div>
        </header>

        <div class="mode-selector">
            <button class="mode-btn active" data-mode="query">Query</button>
            <button class="mode-btn" data-mode="explain">Explain</button>
            <button class="mode-btn" data-mode="docgen">Docs</button>
            <button class="mode-btn" data-mode="patterns">Patterns</button>
            <button class="mode-btn" data-mode="translate">Translate</button>
        </div>

        <div class="query-box">
            <textarea id="queryInput" placeholder="Ask a question about the BLAS codebase..." rows="2"></textarea>
            <div class="query-controls">
                <div class="optional-inputs">
                    <input type="text" id="routineInput" placeholder="Routine name (optional)">
                    <input type="text" id="fileInput" placeholder="File name (optional)">
                </div>
                <div style="display:flex;align-items:center;gap:12px;">
                    <span class="shortcut-hint">Ctrl+Enter</span>
                    <button class="submit-btn" id="submitBtn" onclick="submitQuery()">
                        Submit
                    </button>
                </div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span>Searching BLAS codebase and generating answer...</span>
        </div>

        <div id="resultsArea" style="display:none;">
            <div class="results-grid">
                <div class="answer-panel">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <h3>Answer</h3>
                        <button class="copy-btn" onclick="copyAnswer()">Copy</button>
                    </div>
                    <div class="answer-content" id="answerContent"></div>
                    <div class="answer-meta" id="answerMeta"></div>
                </div>
                <div class="chunks-panel">
                    <h3>Retrieved Chunks</h3>
                    <div id="chunksContainer"></div>
                </div>
            </div>
        </div>

        <div class="empty-state" id="emptyState">
            <h2>Explore the BLAS Codebase</h2>
            <p>Ask questions about the Basic Linear Algebra Subprograms library.
               Try "What does DGEMM do?" or "Show dependencies of DGEMV".</p>
        </div>

        <div class="history" id="historySection" style="display:none;">
            <h3>Recent Queries</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        let currentMode = 'query';
        const modeEndpoints = {
            query: '/query', explain: '/explain', docgen: '/docgen',
            patterns: '/patterns', translate: '/translate'
        };

        // Mode selector
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
            });
        });

        // Ctrl+Enter shortcut
        document.getElementById('queryInput').addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                submitQuery();
            }
        });

        async function submitQuery() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) return;

            const routine = document.getElementById('routineInput').value.trim() || null;
            const file = document.getElementById('fileInput').value.trim() || null;

            // UI state
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('loading').classList.add('active');
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('resultsArea').style.display = 'none';

            const answerEl = document.getElementById('answerContent');
            const metaEl = document.getElementById('answerMeta');
            const chunksEl = document.getElementById('chunksContainer');
            answerEl.textContent = '';
            metaEl.innerHTML = '';
            chunksEl.innerHTML = '';

            // Add to history
            addToHistory(query);

            try {
                const endpoint = modeEndpoints[currentMode];
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, routine, file })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Request failed');
                }

                document.getElementById('loading').classList.remove('active');
                document.getElementById('resultsArea').style.display = 'block';

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = JSON.parse(line.slice(6));

                        if (data.type === 'retrieval') {
                            renderChunks(data.chunks);
                        } else if (data.type === 'text') {
                            answerEl.textContent += data.content;
                        } else if (data.type === 'done') {
                            metaEl.innerHTML = `
                                <span>Latency: ${data.latency_ms}ms</span>
                                <span>Tokens: ${data.input_tokens} in / ${data.output_tokens} out</span>
                                <span>Cost: $${data.cost_usd.toFixed(4)}</span>
                            `;
                        } else if (data.type === 'error') {
                            answerEl.textContent = 'Error: ' + data.content;
                        }
                    }
                }
            } catch (err) {
                document.getElementById('loading').classList.remove('active');
                document.getElementById('resultsArea').style.display = 'block';
                answerEl.textContent = 'Error: ' + err.message;
            } finally {
                document.getElementById('submitBtn').disabled = false;
            }
        }

        function renderChunks(chunks) {
            const container = document.getElementById('chunksContainer');
            container.innerHTML = '';
            if (!chunks || chunks.length === 0) {
                container.innerHTML = '<p style="color:var(--text-dim);font-size:13px;">No matching chunks found.</p>';
                return;
            }
            chunks.forEach((chunk, i) => {
                const scoreClass = chunk.score >= 0.7 ? 'score-high' :
                                   chunk.score >= 0.5 ? 'score-mid' : 'score-low';
                const card = document.createElement('div');
                card.className = 'chunk-card';
                card.innerHTML = `
                    <div class="chunk-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
                        <span class="chunk-file">${chunk.file_path}:${chunk.start_line}-${chunk.end_line}</span>
                        <span class="chunk-score ${scoreClass}">${(chunk.score * 100).toFixed(0)}%</span>
                    </div>
                    <div class="chunk-code" style="display:${i === 0 ? 'block' : 'none'}">
                        <pre><code class="language-fortran">${escapeHtml(chunk.content)}</code></pre>
                    </div>
                `;
                container.appendChild(card);
            });
            // Apply syntax highlighting
            container.querySelectorAll('code').forEach(block => hljs.highlightElement(block));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyAnswer() {
            const text = document.getElementById('answerContent').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy', 1500);
            });
        }

        // History management
        function addToHistory(query) {
            let history = JSON.parse(sessionStorage.getItem('queryHistory') || '[]');
            history = [query, ...history.filter(q => q !== query)].slice(0, 5);
            sessionStorage.setItem('queryHistory', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(sessionStorage.getItem('queryHistory') || '[]');
            const section = document.getElementById('historySection');
            const list = document.getElementById('historyList');
            if (history.length === 0) { section.style.display = 'none'; return; }
            section.style.display = 'block';
            list.innerHTML = history.map(q =>
                `<div class="history-item" onclick="document.getElementById('queryInput').value='${q.replace(/'/g, "\\'")}'">${q}</div>`
            ).join('');
        }

        renderHistory();
    </script>
</body>
</html>
